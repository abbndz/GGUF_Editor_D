[TFrmAbout.lblDescription]
Caption=Fortgeschrittenes Werkzeug zum Bearbeiten, Zusammenführen und Visualisieren von LLM-Modellen \nin GGUF- und Safetensors-Formaten. \nUnterstützt Multi-Level-Quantisierung (Q4_K, Q6_K, Q8_0, NVFP4...), \nEchtzeit-Sampling, Tensor-Vergleich und Metadaten-Bearbeitung.
Hint=Werkzeugbeschreibung

[TFrmAbout.lblCredits]
Caption=- Entwickelt in Delphi 10/11/12 \n- DLL/Impl Dequantisierungs-Engine (hohe RMSE-Präzision) \n- Multi-Quellen-Unterstützung (GGUF, Safetensors) \n- Optimierte UI für LLM-Modell-Analyse \n- Open Source und Community-getrieben
