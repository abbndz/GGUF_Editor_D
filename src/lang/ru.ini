[TFrmAbout.lblDescription]
Caption=Продвинутый инструмент для редактирования, слияния и визуализации LLM моделей \nв форматах GGUF и SafeTensors. \nПоддерживает многоуровневое квантование (Q4_K, Q6_K, Q8_0, NVFP4...), \nвыборку в реальном времени, сравнение тензоров и редактирование метаданных.
Hint=Описание инструмента
[TFrmAbout.lblCredits]
Caption=- Разработано на Delphi 10/11/12 \n- Движок деквантования DLL/Impl (высокая точность RMSE) \n- Поддержка нескольких источников (GGUF, SafeTensors) \n- Оптимизированный UI для анализа LLM моделей \n- Open Source и сообщество
